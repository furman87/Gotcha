server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve Blazor's pre-compressed .gz files transparently
    gzip_static on;

    # Compress any remaining uncompressed responses
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm;

    # Blazor framework files must NEVER fall back to index.html.
    # The SPA try_files in location / would silently return index.html for any
    # missing _framework file. The browser then tries to execute HTML as JS/WASM,
    # producing no useful error and leaving the loading screen permanently visible.
    location /_framework/ {
        try_files $uri =404;
    }

    # Explicitly enforce correct MIME type for WebAssembly files.
    # WebAssembly.instantiateStreaming() requires application/wasm — if the server
    # returns application/octet-stream the browser rejects streaming compilation
    # and Blazor hangs on the loading screen.
    # Regex locations win over prefix locations in nginx, so this takes precedence
    # over the /_framework/ block for any *.wasm file anywhere on the site.
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        gzip_static on;
    }

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Forward the proto set by the upstream host nginx (https)
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Blazor WASM SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
