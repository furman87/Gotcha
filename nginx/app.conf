server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve Blazor's pre-compressed .gz files transparently
    gzip_static on;

    # Compress any remaining uncompressed responses
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Forward the proto set by the upstream host nginx (https)
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Blazor WASM SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
