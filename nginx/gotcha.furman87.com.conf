# Host nginx config for gotcha.furman87.com
# Place in /etc/nginx/sites-available/gotcha.furman87.com
# then: sudo ln -s /etc/nginx/sites-available/gotcha.furman87.com /etc/nginx/sites-enabled/
# Get cert: sudo certbot --nginx -d gotcha.furman87.com
# then: sudo nginx -s reload

server {
    listen 80;
    server_name gotcha.furman87.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name gotcha.furman87.com;

    ssl_certificate /etc/letsencrypt/live/gotcha.furman87.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gotcha.furman87.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8079;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
