<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gotcha</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.focusElement = function (el) { if (el) el.focus(); };

        (function () {
            let _keyHandler = null;
            let _keyRef = null;

            window.addKeyListener = function (dotNetRef) {
                window.removeKeyListener();
                _keyRef = dotNetRef;
                _keyHandler = function (e) {
                    if (e.ctrlKey || e.altKey || e.metaKey || e.isComposing) return;
                    var t = e.target;
                    if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable) return;
                    var k = e.key;
                    if (k === 'Enter' || k === 'Backspace' || (k.length === 1 && /^[a-zA-Z]$/.test(k))) {
                        e.preventDefault();
                        _keyRef.invokeMethodAsync('HandleKeyFromJs', k);
                    }
                };
                document.addEventListener('keydown', _keyHandler);
            };

            window.removeKeyListener = function () {
                if (_keyHandler) {
                    document.removeEventListener('keydown', _keyHandler);
                    _keyHandler = null;
                }
                _keyRef = null;
            };
        })();
    </script>
    <style>
        :root {
            --color-green: #538d4e;
            --color-yellow: #b59f3b;
            --color-gray: #3a3a3c;
            --color-empty: #121213;
            --color-bg: #121213;
            --color-surface: #1a1a1b;
            --color-border: #3a3a3c;
            --color-text: #ffffff;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
        }

        .tile {
            width: 62px;
            height: 62px;
            border: 2px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: border-color 0.1s;
            perspective: 250px;
        }

        .tile-flip {
            animation: flipTile 0.5s ease forwards;
        }

        @keyframes flipTile {
            0% { transform: rotateX(0deg); }
            50% { transform: rotateX(-90deg); }
            100% { transform: rotateX(0deg); }
        }

        .tile-green { background-color: var(--color-green); border-color: var(--color-green); color: white; }
        .tile-yellow { background-color: var(--color-yellow); border-color: var(--color-yellow); color: white; }
        .tile-gray { background-color: var(--color-gray); border-color: var(--color-gray); color: white; }
        .tile-filled { border-color: #565758; }

        .key {
            height: 58px;
            min-width: 43px;
            padding: 0 8px;
            border-radius: 4px;
            background-color: #818384;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            border: none;
            font-family: inherit;
        }

        .key:hover { opacity: 0.8; }
        .key-green { background-color: var(--color-green); }
        .key-yellow { background-color: var(--color-yellow); }
        .key-gray { background-color: var(--color-gray); }
        .key-wide { min-width: 65px; font-size: 0.75rem; }

        .swap-banner {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .blazor-error-boundary {
            display: block;
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: #7f1d1d;
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            max-width: 400px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="app">
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#121213;color:white;font-family:monospace;font-size:1.5rem;">
            Loading Gotcha...
        </div>
    </div>
    <div id="blazor-error-ui" class="blazor-error-boundary">An error has occurred.</div>
    <script>
        (function () {
            var appEl = document.getElementById('app');
            var initialized = false;

            function showError(msg, detail) {
                if (initialized) return;
                appEl.innerHTML =
                    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;'
                    + 'height:100vh;background:#121213;color:white;font-family:monospace;text-align:center;padding:2rem;">'
                    + '<div style="font-size:2rem;margin-bottom:0.75rem;">&#9888;</div>'
                    + '<div style="font-size:1.2rem;font-weight:bold;margin-bottom:0.5rem;">Gotcha failed to load</div>'
                    + '<div style="font-size:0.85rem;color:#ff8080;max-width:520px;word-break:break-word;margin-bottom:0.5rem;">' + msg + '</div>'
                    + '<div style="font-size:0.8rem;color:#aaa;max-width:520px;margin-bottom:1.5rem;">' + detail + '</div>'
                    + '<button onclick="location.reload()" style="background:#538d4e;color:white;border:none;'
                    + 'padding:10px 24px;font-size:0.9rem;cursor:pointer;border-radius:4px;font-family:monospace;">&#8635; Reload</button>'
                    + '</div>';
            }

            // Show an error if Blazor hasn't initialized within 20 seconds
            var loadTimeout = setTimeout(function () {
                showError(
                    'Load timed out after 20 seconds.',
                    'Possible causes: slow network, missing framework files, or nginx misconfiguration. Open the browser console (F12 &rarr; Console &amp; Network tabs) for details.'
                );
            }, 20000);

            // Cancel the timeout once Blazor replaces the #app content
            var observer = new MutationObserver(function () {
                initialized = true;
                clearTimeout(loadTimeout);
                observer.disconnect();
                window.removeEventListener('error', errHandler, true);
            });
            observer.observe(appEl, { childList: true });

            // Catch JavaScript errors and Blazor framework resource load failures.
            // External CDN failures (e.g. Tailwind) are intentionally ignored.
            function errHandler(e) {
                var msg, detail;
                if (e.target && e.target !== window) {
                    // Resource load error — only care about _framework/ files
                    var src = e.target.src || e.target.href || '';
                    if (!src.includes('_framework/')) return;
                    msg = 'Failed to load: ' + src.split('/').pop();
                    detail = 'A required Blazor file could not be fetched. Check the Network tab (F12) for details.';
                } else {
                    // JavaScript runtime error
                    var loc = e.filename ? ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')' : '';
                    msg = (e.message || 'JavaScript error') + loc;
                    detail = 'Open browser DevTools (F12 &rarr; Console) for the full stack trace.';
                }
                showError(msg, detail);
            }
            window.addEventListener('error', errHandler, true);
        })();
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>
</html>
